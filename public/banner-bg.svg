<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="18%" cy="18%" r="65%">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#121110" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="92%" cy="88%" r="60%">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#121110" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="#121110"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect width="1600" height="600" fill="url(#g1)"/>
  <rect width="1600" height="600" fill="url(#g2)"/>

  <!-- abstract browser / website wireframe -->
  <g stroke="#ffffff" stroke-opacity="0.10" fill="none" stroke-width="1.5">
    <rect x="980" y="110" width="540" height="350" rx="18"/>
    <line x1="980" y1="162" x2="1520" y2="162"/>
    <circle cx="1010" cy="136" r="5"/>
    <circle cx="1032" cy="136" r="5"/>
    <circle cx="1054" cy="136" r="5"/>
    <rect x="1012" y="196" width="210" height="150" rx="10"/>
    <rect x="1250" y="196" width="250" height="26" rx="7"/>
    <rect x="1250" y="240" width="190" height="16" rx="6"/>
    <rect x="1250" y="270" width="230" height="16" rx="6"/>
    <rect x="1250" y="300" width="160" height="16" rx="6"/>
    <rect x="1012" y="372" width="488" height="46" rx="10"/>
  </g>

  <!-- code-like accent marks -->
  <g fill="#ffffff" fill-opacity="0.06" font-family="monospace" font-size="26">
    <text x="120" y="170">&lt;/&gt;</text>
    <text x="120" y="470">{ }</text>
